name: Build and deploy to Azure App Service

on:
  push:
    branches: [main, demo/azure-deploy]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: dwa-vv-demo
  DOTNET_VERSION: '10.0.x'
  CONFIGURATION: Release
  PUBLISH_DIR: ${{ github.workspace }}/publish

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: demo
      url: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: 'ga'

      - name: Restore
        run: dotnet restore dwa_ver_val.csproj

      - name: Build
        run: dotnet build dwa_ver_val.csproj --configuration ${{ env.CONFIGURATION }} --no-restore

      - name: Publish
        run: dotnet publish dwa_ver_val.csproj --configuration ${{ env.CONFIGURATION }} --no-build --output ${{ env.PUBLISH_DIR }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.PUBLISH_DIR }}
