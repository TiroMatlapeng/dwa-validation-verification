# ── Default values (used by all environments unless overridden) ──────────────
#
# Override per environment:
#   helm upgrade --install dwa-vv deploy/helm/dwa-vv \
#     -f deploy/helm/dwa-vv/values.prod.yaml \
#     --set image.tag=$GIT_SHA
#
# Required secrets are mounted from Azure Key Vault via the CSI driver.
# See templates/secret-keyvault-csi.yaml.

replicaCount: 2

image:
  # ACR login server — set during deploy: <acr-name>.azurecr.io/dwa-vv
  repository: vnvregistry.azurecr.io/dwa-vv
  tag: latest
  pullPolicy: IfNotPresent

# ── Secret source ─────────────────────────────────────────────────────────────
# useKeyVault: true  → secrets pulled from Azure Key Vault via CSI driver (prod)
# useKeyVault: false → secrets live in a K8s Secret managed by kubectl in CI
#                      (NOT by Helm — Helm --set mangles connection strings with commas)
secrets:
  useKeyVault: true

# Azure Workload Identity — bind the K8s service account to a managed identity
# that has Key Vault Secrets User on the KV.  Set in environment-specific values.
workloadIdentity:
  clientId: ""          # Azure managed-identity client ID — set per environment
  tenantId: ""          # Azure tenant ID — set per environment

keyVault:
  name: ""              # Key Vault name, e.g. kv-dwa-vv-prod
  # Secret names as they appear in Key Vault:
  secrets:
    connectionString: ConnectionStrings--Default         # maps to ConnectionStrings:Default
    demoPwd:          Identity--InitialDemoPassword
    popiaAck:         Portal--AllowPlaintextIdentityNumber

# ── In-cluster SQL Server (dev only) ─────────────────────────────────────────
mssql:
  enabled: false
  image: mcr.microsoft.com/mssql/server:2022-latest
  saPassword: ""        # SA password managed by kubectl in CI — not read by Helm templates
  storageSize: 10Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  # Daily backup to Azure Blob Storage.
  # Storage connection string stored in K8s secret dwa-vv-backup-storage (key: connectionString).
  # Created by CI before helm runs — see deploy-azure.yml.
  # Recovery procedure: docs/runbooks/sql-restore.md
  backup:
    enabled: false                   # set true in dev/prod values to activate
    schedule: "0 2 * * *"           # 02:00 UTC daily (04:00 SAST)
    containerName: mssql-backups

service:
  type: ClusterIP
  port: 80
  targetPort: 8080      # Kestrel binds to PORT env var (default 8080)

ingress:
  enabled: true
  className: nginx      # or webapprouting.io/nginx when using AKS App Routing add-on
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"    # allow document uploads
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
  host: dwa-vv.example.com   # REPLACE with your real DNS name
  tls:
    enabled: true
    secretName: dwa-vv-tls
  # cert-manager ClusterIssuer configuration.
  # The email address is used by Let's Encrypt for certificate expiry notifications.
  # Set per environment — do NOT leave as the placeholder in prod.
  certManagerEmail: admin@example.com

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# Horizontal Pod Autoscaler
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

# Pod Disruption Budget — keep at least 1 pod running during node drain
pdb:
  enabled: true
  minAvailable: 1

# Liveness / readiness probes
probes:
  liveness:
    path: /
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 5
  readiness:
    path: /
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

# ASPNETCORE environment variables injected into the pod (non-secret)
env:
  ASPNETCORE_ENVIRONMENT: Production
  DOTNET_RUNNING_IN_CONTAINER: "true"
  PORT: "8080"

# Upload storage — blob path prefix inside the storage account
# The app currently writes to local filesystem (FileSystemBlobStore).
# Before scale-out, replace with Azure Blob (Task 10.x).
# Interim: use a single-replica deployment (replicaCount: 1) or a shared RWX PVC.
blobStore:
  useLocalDisk: true    # set false when Azure Blob is wired
  # persistentVolumeClaim name if useLocalDisk=true with shared storage
  pvcName: ""
  # Durable storage for the app's PII blob stores (letter PDFs + portal uploads).
  # When enabled, the chart provisions ONE RWO PVC mounted at /app/letter-blobs
  # (subPath letters) and /app/portal-uploads (subPath portal), and switches the
  # deployment strategy to Recreate (RWO disk cannot multi-attach on rollout).
  # Default off so the base chart stays compatible with future RWX/Azure-Blob
  # backends; enable per environment.
  persistence:
    enabled: false
    storageClass: managed-csi   # Azure managed disk (disk.csi.azure.com), RWO
    size: 5Gi
