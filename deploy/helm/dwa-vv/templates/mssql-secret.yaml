{{- if .Values.mssql.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dwa-vv.fullname" . }}-mssql
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dwa-vv.labels" . | nindent 4 }}
type: Opaque
stringData:
  sa-password: {{ .Values.mssql.saPassword | quote }}
{{- end }}
