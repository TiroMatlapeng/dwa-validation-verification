apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "dwa-vv.spcName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dwa-vv.labels" . | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    clientID: {{ .Values.workloadIdentity.clientId | quote }}
    keyvaultName: {{ .Values.keyVault.name | quote }}
    tenantId: {{ .Values.workloadIdentity.tenantId | quote }}
    objects: |
      array:
        - |
          objectName: {{ .Values.keyVault.secrets.connectionString }}
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secrets.demoPwd }}
          objectType: secret
        - |
          objectName: {{ .Values.keyVault.secrets.popiaAck }}
          objectType: secret
  # Sync the KV secrets into a native K8s Secret so the Deployment can reference
  # them as environment variables without mounting the CSI volume on every pod.
  secretObjects:
    - secretName: {{ include "dwa-vv.fullname" . }}-secrets
      type: Opaque
      data:
        - objectName: {{ .Values.keyVault.secrets.connectionString }}
          key: ConnectionStrings__Default
        - objectName: {{ .Values.keyVault.secrets.demoPwd }}
          key: Identity__InitialDemoPassword
        - objectName: {{ .Values.keyVault.secrets.popiaAck }}
          key: Portal__AllowPlaintextIdentityNumber
