apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dwa-vv.fullname" . }}-env
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dwa-vv.labels" . | nindent 4 }}
data:
  # Non-secret runtime environment variables.
  # Secrets are injected from the KV-synced K8s Secret (see secret-keyvault-csi.yaml).
  {{- range $k, $v := .Values.env }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
