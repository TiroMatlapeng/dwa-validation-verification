# Dev / demo cluster overrides (VnV-Project / PBT-DEV Subscription, southafricanorth).
#
# Deploy command (from repo root, after setting env vars):
#   helm upgrade --install dwa-vv deploy/helm/dwa-vv \
#     -f deploy/helm/dwa-vv/values.dev.yaml \
#     --set image.tag=$IMAGE_TAG \
#     --set secrets.connectionString="$CONN_STR" \
#     --set secrets.demoPwd="$DEMO_PWD" \
#     --set mssql.saPassword="$MSSQL_SA_PASSWORD"
#
# ── Current state: raw LoadBalancer IP, no TLS ───────────────────────────────
# Browse to http://<external-ip> once deployed.
#
# ── TLS migration path (when nginx-ingress + cert-manager are deployed) ──────
# 1. Set service.type: ClusterIP  (ingress controller gets the public IP instead)
# 2. Set ingress.enabled: true
# 3. Set ingress.host: <ingress-controller-ip>.nip.io  (or real domain)
# 4. Set ingress.tls.enabled: true
# 5. Set ingress.annotations: { cert-manager.io/cluster-issuer: letsencrypt-prod }
# 6. Set DEV_INGRESS_HOST GitHub Actions variable to the ingress FQDN
# 7. Ensure nginx-ingress controller service exposes port 80 (required for HTTP-01 ACME challenge)
# NOTE: Do NOT set service.type: ClusterIP while ingress.enabled=false — the app will be unreachable.

replicaCount: 1

hpa:
  enabled: false

pdb:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Named static IP — pre-created in the AKS node resource group so the Azure
# object has a human-readable name (see docs/DEPLOYMENT-NAMING-CONVENTION.md §5.1).
# The resource-group annotation must reference the CURRENT node RG; update it to
# rg-dwa-vv-dev-nodes when the cluster is re-provisioned under the convention.
service:
  type: LoadBalancer
  port: 80
  targetPort: 8080
  annotations:
    service.beta.kubernetes.io/azure-pip-name: "pip-dwa-vv-ingress-dev"
    service.beta.kubernetes.io/azure-load-balancer-resource-group: "MC_VnV-Project_vnv-aks_southafricanorth"

ingress:
  enabled: false
  host: ""          # when enabling TLS: set to <nginx-ingress-ip>.nip.io or real domain
  tls:
    enabled: false
  certManagerEmail: matlapengmatlapeng@gmail.com

# Dev uses a plain K8s Secret instead of Key Vault — no CSI driver needed.
secrets:
  useKeyVault: false
  # Real values injected by GitHub Actions via --set; placeholders committed here.
  connectionString: ""
  demoPwd: ""
  popiaAck: "true"

# Workload identity not needed in dev (no Key Vault).
workloadIdentity:
  clientId: ""
  tenantId: ""

keyVault:
  name: ""

# SQL Server runs as a pod in the cluster.
mssql:
  enabled: true
  saPassword: ""        # injected by GitHub Actions via --set
  backup:
    enabled: true
    schedule: "0 2 * * *"          # 02:00 UTC daily (04:00 SAST)
    containerName: mssql-backups
    # Storage connection string injected by CI via the "Create backup storage secret" step.
    # The full Azure Storage connection string is stored in K8s secret
    # dwa-vv-backup-storage (key: connectionString).
    # Add DEV_BACKUP_STORAGE_CONN_STR to GitHub Actions Secrets to activate backups.

# Single replica + local disk = safe for dev (no split-brain on uploads).
blobStore:
  useLocalDisk: true
  pvcName: ""
  # Persist letter PDFs and portal uploads on a durable Azure managed disk.
  # Without this these PII artefacts live on the container overlay FS and are
  # lost on every pod restart/redeploy. southafricanorth disk = POPIA-resident.
  # Enabling this switches the deployment strategy to Recreate (single replica,
  # RWO disk cannot multi-attach during a rolling update).
  persistence:
    enabled: true
    storageClass: managed-csi
    size: 5Gi
