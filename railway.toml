# Railway build + deploy configuration.
# Railway auto-detects the Dockerfile at the repo root; this file overrides defaults.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Railway injects PORT at runtime; the Dockerfile binds Kestrel to $PORT via ASPNETCORE_URLS.
startCommand = "dotnet dwa_ver_val.dll"
healthcheckPath = "/Account/Login"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
