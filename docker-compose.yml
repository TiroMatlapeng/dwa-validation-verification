services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong!Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    healthcheck:
      # Wait until sqlcmd can execute a trivial query before the app starts.
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong!Passw0rd' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    networks:
      - sql-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dwa-vv-app
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Default=Server=sqlserver,1433;Database=dwa_val_ver;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True
      - Identity__InitialDemoPassword=DwaDemo2026!
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - sql-network

networks:
  sql-network:
    driver: bridge
